<div class="contacts-page container">
  <header class="contacts-header animate-up">
    <h1>Контакти</h1>
    <div class="header-divider"></div>
    <p>Ми завжди раді допомогти вам з бронюванням або відповісти на будь-які запитання.</p>
  </header>

  <div class="contacts-wrapper">
    <!-- Блок інформації -->
    <section class="info-section animate-up delay-1">
      <div class="contact-card">
        <div class="card-icon">📍</div>
        <div class="card-text">
          <h3>Адреса</h3>
          <p>вул. Домініканська, 2, Кам'янець-Подільський, Україна</p>
        </div>
      </div>

      <div class="contact-card">
        <div class="card-icon">📞</div>
        <div class="card-text">
          <h3>Телефони</h3>
          <p><a href="tel:+380675435074">+38 (067) 543-50-74</a></p>
        </div>
      </div>

      <div class="contact-card">
        <div class="card-icon">✉️</div>
        <div class="card-text">
          <h3>Email</h3>
          <p><a href="mailto:info@spadok-hotel.com.ua">info@spadok-hotel.com.ua</a></p>
        </div>
      </div>
    </section>

    <!-- Блок форми -->
    <section class="form-section animate-up delay-2">
      <div class="form-container">
        <h2>Напишіть нам</h2>
        <form class="styled-form" (submit)="$event.preventDefault()">
          <div class="input-group">
            <input type="text" id="name" placeholder="Ваше ім'я" required>
          </div>
          <div class="input-group">
            <input type="email" id="email" placeholder="Ваш Email" required>
          </div>
          <div class="input-group">
            <textarea id="message" rows="4" placeholder="Ваше повідомлення..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">Відправити повідомлення</button>
        </form>
      </div>
    </section>
  </div>
</div>
