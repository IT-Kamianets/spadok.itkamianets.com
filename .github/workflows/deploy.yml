name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href /

      - name: Add .nojekyll file
        run: touch dist/Spadok/browser/.nojekyll

      - name: Create CNAME file automatically
        run: echo "spadok.itkamianets.com" > dist/Spadok/browser/CNAME

      - name: Copy index.html to 404.html (for SPA routing)
        run: cp dist/Spadok/browser/index.html dist/Spadok/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/Spadok/browser
          branch: gh-pages
